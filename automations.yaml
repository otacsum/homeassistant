# Triggers the sunrise script when the input_boolean is pressed
- alias: "Bedroom Sunrise - Start"
  description: "Starts the bedroom sunrise dimmer script when the virtual switch is turned on."
  trigger:
    - platform: state
      entity_id: input_boolean.bedroom_sunrise_start
      to: "on"
  action:
    - service: script.turn_on
      target:
        entity_id: script.bedroom_sunrise
  mode: single

# Cancels the sunrise script if the dimmer switch is turned off externally
- alias: "Bedroom Sunrise - Cancel on Light Off"
  description: "Cancels the sunrise script if the bedroom light is turned off while the script is running."
  trigger:
    - platform: state
      entity_id: switch.bedroom_dimmer_fan_light
      to: "off"
  condition:
    - condition: state
      entity_id: script.bedroom_sunrise
      state: "on"
  action:
    - service: script.turn_off
      target:
        entity_id: script.bedroom_sunrise
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_sunrise_start

# Cancels the sunrise script if brightness is manually adjusted during the ramp
- alias: "Bedroom Sunrise - Cancel on Brightness Adjustment"
  description: "Cancels if number.bedroom_dimmer_fan_bright_value deviates more than 50 units from the expected ramp value."
  trigger:
    - platform: state
      entity_id: number.bedroom_dimmer_fan_bright_value
  condition:
    - condition: state
      entity_id: script.bedroom_sunrise
      state: "on"
    - condition: template
      value_template: >
        {{ (trigger.to_state.state | float - states('input_number.bedroom_sunrise_expected_brightness') | float) | abs > 50 }}
  action:
    - service: script.turn_off
      target:
        entity_id: script.bedroom_sunrise
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_sunrise_start
