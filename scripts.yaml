bedroom_light_level:
  sequence:
    - alias: "Turn on or off based on brightness"
      if:
        - "{{ brightness | int > 0 }}"
      then:
        - alias: "Turn on ceiling light"
          action: switch.turn_on
          target:
            entity_id: switch.bedroom_dimmer_fan_light

        - alias: "Set brightness"
          action: number.set_value
          target:
            entity_id: number.bedroom_dimmer_fan_bright_value
          data:
            value: "{{ (brightness / 255) * 1000 }}"
      else:
        - alias: "Turn off ceiling light"
          action: switch.turn_off
          target:
            entity_id: switch.bedroom_dimmer_fan_light

bedroom_fan_speed:
  sequence:
    - alias: "Turn on or off based on percentage"
      if:
        - "{{ percentage | int > 0 }}"
      then:
        - alias: "Turn on fan"
          action: switch.turn_on
          target:
            entity_id: switch.bedroom_dimmer_fan_switch_fan

        - alias: "Set fan speed"
          action: fan.set_percentage
          target:
            entity_id: fan.bedroom_overhead_switches
          data:
            percentage: "{{ percentage }}"
      else:
        - alias: "Turn off fan"
          action: switch.turn_off
          target:
            entity_id: switch.bedroom_dimmer_fan_switch_fan

bedroom_sunrise:
  alias: "Bedroom Sunrise Dimmer"
  description: "Phase 1: minimum→20% at 1%/30s. Phase 2: 25%→100% at 5%/60s. Cancels on external off or brightness adjustment."
  mode: single
  sequence:
    # Pre-set brightness on the number entity BEFORE turning on the switch.
    # This prevents flicker from the switch coming on at its previous brightness.
    - service: number.set_value
      target:
        entity_id: number.bedroom_dimmer_fan_bright_value
      data:
        value: 10.0
    # Track expected brightness for external-adjustment detection (10.0 = minimum)
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_sunrise_expected_brightness
      data:
        value: 10.0
    - service: switch.turn_on
      target:
        entity_id: switch.bedroom_dimmer_fan_light

    # Phase 1: 2%→20%, 1% every 30 seconds (19 steps)
    - repeat:
        count: 19
        sequence:
          - delay:
              seconds: 30
          - service: light.turn_on
            target:
              entity_id: light.bedroom_dimmer
            data:
              brightness_pct: "{{ 2 + repeat.index - 1 }}"
          # Update expected value immediately after setting brightness.
          # brightness_pct * 10 approximates the number entity value (0-1000 scale).
          - service: input_number.set_value
            target:
              entity_id: input_number.bedroom_sunrise_expected_brightness
            data:
              value: "{{ (2 + repeat.index - 1) * 10 }}"

    # Phase 2: 25%→100%, 5% every 60 seconds (16 steps)
    - repeat:
        count: 16
        sequence:
          - delay:
              seconds: 60
          - service: light.turn_on
            target:
              entity_id: light.bedroom_dimmer
            data:
              brightness_pct: "{{ 25 + (repeat.index - 1) * 5 }}"
          - service: input_number.set_value
            target:
              entity_id: input_number.bedroom_sunrise_expected_brightness
            data:
              value: "{{ (25 + (repeat.index - 1) * 5) * 10 }}"

    # Reset the virtual switch when complete
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_sunrise_start
